<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacientes — Psisoft</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">

  <div class="sidebar-header">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <rect width="26" height="26" rx="7" fill="#2563eb"/>
      <path d="M7 13h4l2-4 2 8 2-4h2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <button class="back-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="clinic-card">
    <div class="clinic-avatar" id="sidebar-avatar">--</div>
    <div class="clinic-info">
      <div class="clinic-name" id="sidebar-name">Carregando...</div>
      <div class="clinic-city">Psicólogo</div>
    </div>
  </div>

  <div class="nav-section">
    <div class="nav-label">Menu</div>
    <div class="nav-item">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1.5" y="8.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8.5" y="8.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
      Aplicações
      <svg class="nav-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 5l2 2 2-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <div class="nav-section">
    <div class="nav-label">Clínica</div>
    <div class="nav-item active" style="flex-wrap: wrap; cursor: default;">
      <div style="display: flex; align-items: center; width: 100%; gap: 9px; cursor: pointer;" onclick="document.getElementById('pacientes-dropdown').style.display = document.getElementById('pacientes-dropdown').style.display === 'none' ? 'block' : 'none'">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M1.5 13c0-2.76 2.24-5 4.5-5s4.5 2.24 4.5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M11 7.5c.83 0 1.5.67 1.5 1.5v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M10 9.5h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Pacientes
        <svg class="nav-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 5l2 2 2-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div id="pacientes-dropdown" style="display: block; width: 100%; padding-left: 24px; margin-top: 8px;">
        <div style="padding: 6px 0; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: color 0.15s;" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'" onclick="window.location.href='cadastro-paciente.html'">+ Novo Paciente</div>
        <div style="padding: 6px 0; font-size: 13px; color: var(--text-primary); font-weight: 500; cursor: pointer;">Visualizar Todos</div>
      </div>
    </div>
    <div class="nav-item" onclick="window.location.href='agendamentos.html'">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="2.5" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 1.5v2M10 1.5v2M1.5 6.5h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Agendamentos
    </div>
  </div>

</aside>

<!-- ── MAIN ── -->
<div class="main">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#9ca3af" stroke-width="1.4"/><path d="M9.5 9.5L12 12" stroke="#9ca3af" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input type="text" placeholder="Buscar">
      <span class="search-kbd">⌘K</span>
    </div>
    <div class="topbar-spacer"></div>
    <button class="ai-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2l1.2 3.8H12L9 7.9l1.2 3.8L7 9.6l-3.2 2.1L5 7.9 2 5.8h3.8z" fill="currentColor"/></svg>
      Assistente AI
    </button>
    <div class="topbar-avatar" id="topbar-avatar-circle" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;">
      --
    </div>
  </header>

  <!-- CONTENT -->
  <main class="content">
    <div class="page-header">
      <h1 class="page-title">Meus Pacientes</h1>
      <div class="header-actions">
        <button class="btn btn-outline">Exportar</button>
        <button class="btn btn-primary" onclick="window.location.href='cadastro-paciente.html'">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 2v9M2 6.5h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          Novo Paciente
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Paciente</th>
            <th>CPF</th>
            <th>Nascimento</th>
            <th>Telefone</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="pacientes-tbody">
          <tr><td colspan="6" style="text-align: center; color: var(--text-muted);">Carregando pacientes...</td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script>
  const psi_id = localStorage.getItem('psi_id');
  const token = localStorage.getItem('token');
  const psi_nome = localStorage.getItem('psi_nome');

  if (psi_nome) {
    document.getElementById('sidebar-name').textContent = 'Dr(a). ' + psi_nome.split(' ')[0];
    const initial = psi_nome.charAt(0).toUpperCase();
    document.getElementById('sidebar-avatar').textContent = initial;
    document.getElementById('topbar-avatar-circle').textContent = initial;
  }

  async function carregarPacientes() {
    if (!psi_id || !token) {
      document.getElementById('pacientes-tbody').innerHTML = '<tr><td colspan="6" style="text-align: center;">Não autenticado.</td></tr>';
      return;
    }
    
    try {
      const response = await fetch(`http://localhost:3000/pacientes/psicologos/${psi_id}/pacientes`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (!response.ok) throw new Error('Falha ao buscar pacientes');
      
      const pacientes = await response.json();
      const tbody = document.getElementById('pacientes-tbody');
      tbody.innerHTML = ''; 
      
      if (pacientes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">Nenhum paciente cadastrado.</td></tr>';
        return;
      }

      pacientes.forEach(paciente => {
        const pacienteLetra = paciente.nome.charAt(0).toUpperCase();
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="mode-text">#${paciente.id}</td>
            <td>
              <div class="person-cell">
                <div class="avatar-placeholder" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">${pacienteLetra}</div>
                <div>
                  <div class="person-name">${paciente.nome}</div>
                  <div class="person-sub">${paciente.email}</div>
                </div>
              </div>
            </td>
            <td class="td-datetime">${paciente.cpf}</td>
            <td class="td-datetime">${paciente.data_nascimento}</td>
            <td class="td-datetime">${paciente.telefone || '--'}</td>
            <td>
              <button class="more-btn">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="3" r="1" fill="currentColor"/><circle cx="7" cy="7" r="1" fill="currentColor"/><circle cx="7" cy="11" r="1" fill="currentColor"/></svg>
              </button>
            </td>
        `;
        tbody.appendChild(tr);
      });
    } catch (error) {
      console.error('Erro ao carregar pacientes:', error);
      document.getElementById('pacientes-tbody').innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Erro ao carregar os dados.</td></tr>';
    }
  }

  window.addEventListener('load', carregarPacientes);
</script>
</body>
</html>
