services:
  db:
    image: postgres:17-alpinel
    container_name: psisoft_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1322}
      POSTGRES_DB: psisoft
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psisoft_app
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-1322}@db:5432/psisoft
      JWT_SECRET: ${JWT_SECRET:-sua_chave_secreta_aqui_123}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
